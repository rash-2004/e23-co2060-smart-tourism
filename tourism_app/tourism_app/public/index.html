<!DOCTYPE html>
<html>
<head>
    <title>Tourism Itinerary Planner</title>
</head>
<body>

<h1>Sri Lanka Tourism Planner</h1>

<button onclick="showInterest()">By Interest</button>
<button onclick="showLocation()">By Location</button>

<div id="selection"></div>
<div id="results"></div>

<script>

function showInterest() {
    document.getElementById("selection").innerHTML = `
        <h3>Select Interest</h3>
        <select onchange="getByInterest(this.value)">
            <option value="">Select</option>
            <option value="Wildlife">Wildlife</option>
            <option value="Surfing">Surfing</option>
            <option value="Cultural Heritage">Cultural Heritage</option>
        </select>
    `;
}

function showLocation() {
    document.getElementById("selection").innerHTML = `
        <h3>Select Location</h3>
        <select onchange="getByLocation(this.value)">
            <option value="">Select</option>
            <option value="Kandy">Kandy</option>
            <option value="Colombo">Colombo</option>
            <option value="Galle">Galle</option>
        </select>
    `;
}

async function getByInterest(tag) {
    if (!tag) return;
    const response = await fetch(`/api/by-interest/${tag}`);
    const data = await response.json();
    displayResults(data);
}

async function getByLocation(city) {
    if (!city) return;
    const response = await fetch(`/api/by-location/${city}`);
    const data = await response.json();
    displayResults(data);
}

function displayResults(data) {
    let html = "<h3>Results:</h3>";
    data.forEach(place => {
        html += `
            <div style="border:1px solid black; padding:10px; margin:10px;">
                <h4>${place.name}</h4>
                <p>${place.description}</p>
                <small>City: ${place.city} | Tag: ${place.tag}</small>
            </div>
        `;
    });
    document.getElementById("results").innerHTML = html;
}

</script>

</body>
</html>
